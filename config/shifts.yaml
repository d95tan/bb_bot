# Shift Configuration
# Two-tier lookup: code_mappings (primary) -> color_fallbacks (secondary)

# Shift groups for reminders. Keys match code_mappings categories (AM, PM, Night, Off, etc.) for 1:1 control.
# Reminder: reminder_offset_minutes = offset from shift start (+ after, - before); or reminder_at = fixed HH:MM
# Time-based classification (when event name doesn't match) uses AM/PM/Night boundaries and Off for all_day/rest_day.
shift_groups:
  AM:
    reminder_offset_minutes: 30
    start_before: "12:00"         # shift starts before noon
  Swing:
    reminder_offset_minutes: 30   # same as AM; no time boundaries (name-only)
  PM:
    reminder_offset_minutes: -60
    start_from: "12:00"
    start_before: "19:00"
  Night:
    reminder_offset_minutes: -60
    start_from: "19:00"
  Training:
    reminder_offset_minutes: 30
  Project:
    reminder_offset_minutes: 30
  "Off":
    reminder_offset_minutes: null
    reminder_at: "09:30"         # fixed time for off days (RD, DO, etc.). Set to null to disable.
  Leave:
    reminder_offset_minutes: null
    reminder_at: "09:30"
  Medical:
    reminder_offset_minutes: null
    reminder_at: "09:30"
    

# Primary: Direct code-to-shift mappings
# Optional category layer: code_mappings can be flat (CODE: {...}) or grouped (CATEGORY: { CODE: {...}, ... })
