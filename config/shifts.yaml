# Secondary: Color-based fallback mappings
# Same category structure as code_mappings: CATEGORY: { color_name: { rgb_range, shift, ... }, ... }
# Lookup is by color name; categories (AM, PM, etc.) set reminder group and organise the file.
color_fallbacks:
  AM:
    light_green:
      rgb_range:
        r: [160, 210]
        g: [200, 255]
        b: [165, 215]
      shift:
        name: "AM (Colour)"
        start: "07:30"
        end: "16:00"
        same_day: true
        description: "AM Shift (detected by LIGHT GREEN colour)"

  PM:
    pink:
      rgb_range:
        r: [200, 255]
        g: [100, 180]
        b: [150, 220]
      shift:
        name: "PM (Colour)"
        start: "13:30"
        end: "21:30"
        same_day: true
        description: "PM Shift (detected by PINK colour)"

  Night:
    blue:
      rgb_range:
        r: [135, 185]
        g: [170, 220]
        b: [205, 255]
      shift:
        name: "Nig (Colour)"
        start: "21:00"
        end: "08:00"
        same_day: false
        description: "Night Shift (detected by BLUE colour)"

  Project:
    dark_green:
      rgb_range:
        r: [60, 100]
        g: [140, 180]
        b: [100, 140]
      shift:
        name: "Project (Colour)"
        start: "08:00"
        end: "17:00"
        same_day: true
        description: "Project (detected by DARK GREEN colour)"

  Leave:
    yellow:
      rgb_range:
        r: [230, 255]
        g: [230, 255]
        b: [100, 180]
      shift:
        name: "Leave (Colour)"
        all_day: true
        description: "Leave (detected by YELLOW colour)"
    BOILU:
      rgb_range:
        r: [130, 160]
        g: [130, 160]
        b: [45, 75]
      shift:
        name: "AL (Colour)"
        all_day: true
        description: "Birthday Off-in-lieu (Unapproved) (detected by OLIVE color)"

  "Off":
    white:
      rgb_range:
        r: [160, 210]
        g: [160, 210]
        b: [160, 210]
