version: "3.8"

services:
  bb_bot:
    build: .
    container_name: bb_bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Persist debug output (optional)
      - ./debug:/app/debug
      # Mount config for easy editing without rebuild
      - ./config:/app/config:ro
    # Optional: healthcheck
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
