# Secondary: Color-based fallback mappings
# Used when shift code is not found in code_mappings
# Colors are defined as RGB ranges for detection
color_fallbacks:
  light_green:
    # Light Green: AM/Day shifts
    rgb_range:
      r: [160, 210]
      g: [200, 255]
      b: [165, 215]
    shift:
      name: "AM (Colour)"
      start: "07:30"
      end: "16:00"
      same_day: true
      description: "AM Shift (detected by LIGHT GREEN colour)"

  pink:
    # Pink/Salmon: E0M8, E13H type shifts
    rgb_range:
      r: [200, 255]
      g: [100, 180]
      b: [150, 220]
    shift:
      name: "PM (Colour)"
      start: "13:30"
      end: "21:30"
      same_day: true
      description: "PM Shift (detected by PINK colour)"

  blue:
    # Blue: Night shifts
    rgb_range:
      r: [135, 185]
      g: [170, 220]
      b: [205, 255]
    shift:
      name: "Nig (Colour)"
      start: "21:00"
      end: "08:00"
      same_day: false
      description: "Night Shift (detected by BLUE colour)"

  dark_green:
    # Dark Green: Project
    rgb_range:
      r: [60, 100]
      g: [140, 180]
      b: [100, 140]
    shift:
      name: "Project (Colour)"
      start: "08:00"
      end: "17:00"
      same_day: true
      description: "Project (detected by DARK GREEN colour)"

  yellow:
    # Yellow: Leave types
    rgb_range:
      r: [230, 255]
      g: [230, 255]
      b: [100, 180]
    shift:
      name: "Leave (Colour)"
      all_day: true
      description: "Leave (detected by YELLOW colour)"

  white:
    # White: Day off / Rest day (if there is text. However, if there is no text, it is an empty cell and should be skipped)
    rgb_range:
      r: [160, 210]
      g: [160, 210]
      b: [160, 210]
    skip: true

  purple:
    # Purple: Public Holiday
    rgb_range:
      r: [180, 230]
      g: [150, 200]
      b: [220, 255]
    shift:
      name: "PH (Colour)"
      all_day: true
      description: "Public Holiday (detected by PURPLE colour)"

  medium_green:
    # Green: Training
    rgb_range:
      r: [145, 175]
      g: [185, 215]
      b: [35, 65]
    shift:
      name: "TL (Colour)"
      start: "08:00"
      end: "18:00"
      same_day: true
      description: "Training (detected by MEDIUM GREEN colour)"

  BOILU:
    # Olive: Birthday Off-in-lieu (Unapproved)
    rgb_range:
      r: [130, 160]
      g: [130, 160]
      b: [45, 75]
    shift:
      name: "AL (Colour)"
      all_day: true
      description: "Birthday Off-in-lieu (Unapproved) (detected by OLIVE color)"
