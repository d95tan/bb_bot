services:
  redis:
    image: redis:7-alpine
    container_name: bb_bot_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    # Optional: persist to disk so acks survive container restarts
    command: redis-server --appendonly yes

  bb_bot:
    build: .
    container_name: bb_bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Use in-compose Redis for reminder state (override in .env if using external Redis)
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    volumes:
      - ./debug:/app/debug
      - ./data:/app/data
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis_data:
