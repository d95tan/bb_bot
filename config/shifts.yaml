# Shift Configuration
# Two-tier lookup: code_mappings (primary) -> color_fallbacks (secondary)

# Primary: Direct code-to-shift mappings
# Each code maps to shift timing
code_mappings:
  # AM/Day Shifts (Light Green colored)
  D077S:
    start: "07:30"
    end: "14:30"
    same_day: true
    description: "AM Shift (Short)"
  
  D0GG:
    start: "07:30"
    end: "15:00"
    same_day: true
    description: "AM Shift (Short)"
  
  D0G8:
    start: "07:30"
    end: "15:30"
    same_day: true
    description: "AM Shift"

  D0GH:
    start: "07:30"
    end: "16:00"
    same_day: true
    description: "AM Shift"

  D0G9:
    start: "07:30"
    end: "16:30"
    same_day: true
    description: "AM Shift (Long)"

  D0GI:
    start: "07:30"
    end: "17:00"
    same_day: true
    description: "AM Shift (Long)"

  D09F:
    start: "09:00"
    end: "16:30"
    same_day: true
    description: "Swing Shift (Short)"

  D098:
    start: "09:00"
    end: "17:00"
    same_day: true
    description: "Swing Shift"

  # PM Shifts (Pink/Salmon colored)
  E0M8:
    start: "13:30"
    end: "21:30"
    same_day: true
    description: "PM Shift"
  
  E13H:
    start: "13:00"
    end: "21:30"
    same_day: true
    description: "PM Shift (Early)"

  E139:
    start: "13:00"
    end: "22:00"
    same_day: true
    description: "PM Shift (Late)"

  # Night Shifts (Blue colored)
  N2111:
    start: "21:00"
    end: "08:00"
    same_day: false
    description: "Night Shift"

  # Training (Medium Green colored)
  TD:
    start: "08:30"
    end: "17:30"
    same_day: true
    description: "Training Day"
  
  TDE:
    start: "08:30"
    end: "17:30"
    same_day: true
    description: "Training Day (External)"
  
  TR_FD:
    start: "08:30"
    end: "17:30"
    same_day: true
    description: "Trainer - Full Day"

  # Project Shift
  D08...:
    start: "08:00"
    end: "17:00"
    same_day: true
    description: "Project Shift"
  
  # Day Off / Rest Day (Gray colored)
  DO:
    all_day: true
    description: "Day Off"
  
  RD:
    all_day: true
    description: "Rest Day"

  # Leave Types (Yellow colored)
  AL:
    all_day: true
    description: "Annual Leave"
  
  ALU:
    all_day: true
    description: "Annual Leave (Unapproved)"
  
  HL:
    all_day: true
    description: "Hospitalisation Leave"

  HLU:
    all_day: true
    description: "Hospitalisation Leave (Unapproved)"
  
  FCL:
    all_day: true
    description: "Family Care Leave"
  
  FCLU:
    all_day: true
    description: "Family Care Leave (Unapproved)"

  # Medical (Purple colored)
  MC:
    all_day: true
    description: "Sick Leave"
  
  MCU:
    all_day: true
    description: "Sick Leave (Unapproved)"
  
  # Other
  PH:
    all_day: true
    description: "Public Holiday"

  BOILU:
    all_day: true
    description: "Birthday Off-in-lieu (Unapproved)"

  DOL:
    all_day: true
    description: "Off-in-lieu"


# Secondary: Color-based fallback mappings
# Used when shift code is not found in code_mappings
# Colors are defined as RGB ranges for detection
color_fallbacks:
  pink:
    # Pink/Salmon: E0M8, E13H type shifts
    rgb_range:
      r: [200, 255]
      g: [100, 180]
      b: [150, 220]
    shift:
      start: "13:30"
      end: "21:30"
      same_day: true
      description: "PM Shift (detected by color)"

  blue:
    # Blue: Night shifts
    rgb_range:
      r: [80, 150]
      g: [150, 220]
      b: [200, 255]
    shift:
      start: "21:00"
      end: "08:00"
      same_day: false
      description: "Night Shift (detected by color)"

  light_green:
    # Light Green: AM/Day shifts
    rgb_range:
      r: [150, 220]
      g: [200, 255]
      b: [100, 180]
    shift:
      start: "07:30"
      end: "15:30"
      same_day: true
      description: "AM Shift (detected by color)"

  dark_green:
    # Dark Green: Project
    rgb_range:
      r: [60, 100]
      g: [140, 180]
      b: [100, 140]
    shift:
      start: "08:00"
      end: "17:00"
      same_day: true
      description: "Project (detected by color)"

  yellow:
    # Yellow: Leave types
    rgb_range:
      r: [230, 255]
      g: [230, 255]
      b: [100, 180]
    shift:
      all_day: true
      description: "Leave (detected by color)"

  gray:
    # Gray: Day off / Rest day
    rgb_range:
      r: [145, 175]
      g: [145, 175]
      b: [145, 175]
    shift:
      all_day: true
      description: "Unapproved Leaves (detected by color)"

  purple:
    # Purple: Medical/Course/PH
    rgb_range:
      r: [180, 230]
      g: [150, 200]
      b: [220, 255]
    shift:
      all_day: true
      description: "Medical/Course (detected by color)"

  medium_green:
    # Green: Training
    rgb_range:
      r: [145, 175]
      g: [185, 215]
      b: [35, 65]
    shift:
      start: "08:00"
      end: "18:00"
      same_day: true
      description: "Training (detected by color)"

  BOILU:
    # Olive: Birthday Off-in-lieu (Unapproved)
    rgb_range:
      r: [130, 160]
      g: [130, 160]
      b: [45, 75]
    shift:
      all_day: true
      description: "Birthday Off-in-lieu (Unapproved) (detected by OLIVE color)"
